<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인공지능 동물상 테스트</title>
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5272452795652574"
     crossorigin="anonymous"></script>
</head>
<body>
    <button id="theme-toggle" class="theme-toggle">🌙</button>
    <div class="container">
        <h1>인공지능 동물상 테스트 🐶🐱</h1>
        <p class="description">나는 강아지상일까 고양이상일까?<br>사진을 올려 확인해보세요! ✨</p>
        
        <div class="image-upload-wrap">
            <input class="file-upload-input" type='file' onchange="readURL(this);" accept="image/*" />
            <div class="drag-text">
                <h3>사진을 올려놓거나 눌러서 업로드하세요</h3>
            </div>
        </div>
        
        <div class="file-upload-content">
            <img class="file-upload-image" id="face-image" src="#" alt="your image" />
            <div id="loading" class="animated-bounce">
                <div class="spinner"></div>
                <p>AI가 분석 중입니다...</p>
            </div>
            <div class="result-message"></div>
            <div id="label-container"></div>
            <div class="image-title-wrap">
                <button type="button" onclick="removeUpload()" class="remove-image">다른 사진으로 재시도</button>
            </div>
        </div>

        <div class="contact-section">
            <h3>🤝 제휴 문의</h3>
            <form action="https://formspree.io/f/meeejzno" method="POST" class="contact-form">
                <input type="email" name="email" placeholder="이메일 주소" required>
                <textarea name="message" placeholder="문의 내용을 입력해주세요" required></textarea>
                <button type="submit">문의 보내기</button>
            </form>
        </div>

        <div id="disqus_thread" style="margin-top: 50px;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="script.js"></script>
    <script>
        /**

</body>
</html>
