<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI가 분석해주는 나의 사주와 운세! 이름, 생년월일, 태어난 시간으로 확인해보세요.">
    <meta property="og:title" content="AI 사주 분석 🔮">
    <meta property="og:description" content="나의 타고난 운명과 올해의 운세는? 지금 바로 확인하세요.">
    <title>AI 사주 분석 - 나의 운명 확인하기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">운명 연구소 🔮</div>
        <div class="nav-links">
            <button id="theme-toggle" class="theme-toggle">🌙</button>
        </div>
    </nav>

    <div class="container">
        <header class="header">
            <h1>AI 사주 분석 🔮</h1>
            <p class="description">당신의 이름과 생년월일을 입력하면<br>타고난 기운과 흐름을 분석해드립니다.</p>
        </header>
        
        <div class="card form-card">
            <form id="saju-form">
                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" name="name" placeholder="홍길동" required>
                </div>
                
                <div class="form-group">
                    <label>성별</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="gender" value="male" checked> 남성
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="gender" value="female"> 여성
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="birthdate">생년월일</label>
                    <input type="date" id="birthdate" name="birthdate" required>
                </div>

                <div class="form-group">
                    <label for="birthtime">태어난 시간 (선택)</label>
                    <input type="time" id="birthtime" name="birthtime">
                    <small class="hint">* 시간을 모르면 정확도가 다소 떨어질 수 있습니다.</small>
                </div>

                <button type="submit" class="analyze-btn">운세 확인하기</button>
            </form>
        </div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>천기누설 중... 잠시만 기다려주세요.</p>
        </div>

        <div id="result" class="result hidden">
            <div class="card result-card">
                <h2 id="result-name" class="result-title"></h2>
                <div class="saju-grid">
                    <div class="saju-item">
                        <span class="label">년주(年柱)</span>
                        <span class="value" id="year-pillar">??</span>
                    </div>
                    <div class="saju-item">
                        <span class="label">월주(月柱)</span>
                        <span class="value" id="month-pillar">??</span>
                    </div>
                    <div class="saju-item">
                        <span class="label">일주(日柱)</span>
                        <span class="value" id="day-pillar">??</span>
                    </div>
                    <div class="saju-item">
                        <span class="label">시주(時柱)</span>
                        <span class="value" id="time-pillar">??</span>
                    </div>
                </div>
            </div>

            <div class="card analysis-card">
                <h3>📜 타고난 성향</h3>
                <p id="personality-text"></p>
            </div>

            <div class="card analysis-card">
                <h3>💰 재물운</h3>
                <p id="wealth-text"></p>
            </div>

            <div class="card analysis-card">
                <h3>🗓️ 올해의 운세 흐름</h3>
                <ul id="yearly-luck-list" class="luck-list"></ul>
            </div>

            <button onclick="location.reload()" class="retry-btn">다시 입력하기</button>
        </div>
    </div>

    <footer class="footer">
        <p>© 2026 운명 연구소. 재미로 보는 AI 사주입니다.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
